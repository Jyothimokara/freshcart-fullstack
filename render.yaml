services:
  # Django Backend Web Service
  - type: web
    name: freshcart-backend
    env: python
    buildCommand: "chmod a+x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: freshcart-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173"

databases:
  - name: freshcart-db
    plan: free
